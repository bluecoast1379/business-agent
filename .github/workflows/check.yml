name: check

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            node: 18
          - os: ubuntu-latest
            node: 20
          - os: ubuntu-latest
            node: 22
          - os: macos-latest
            node: 20
          - os: windows-latest
            node: 20
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - name: run all gates (syntax / sanitized / manifest / scaffold / tests)
        run: npm run check
