<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" role="img" aria-labelledby="architecture-title architecture-desc">
  <title id="architecture-title">Business Agent Kit architecture</title>
  <desc id="architecture-desc">Five stages flow from business discovery to operating evidence, supported by a workflow core, thin tool adapters, and a zero-dependency runtime scaffold.</desc>
  <defs>
    <linearGradient id="architecture-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#070B14"/>
      <stop offset="1" stop-color="#0B1918"/>
    </linearGradient>
    <linearGradient id="architecture-line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2DD4BF"/>
      <stop offset="1" stop-color="#A3E635"/>
    </linearGradient>
    <marker id="architecture-arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0 10 5 0 10Z" fill="#A3E635"/>
    </marker>
    <filter id="architecture-shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>
  <rect width="1440" height="900" rx="32" fill="url(#architecture-bg)"/>

  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <text x="72" y="92" fill="#F8FAFC" font-size="46" font-weight="730">Architecture · 从业务判断到运行证据</text>
    <text x="72" y="136" fill="#A7B0C0" font-size="22">方法论、工具入口与运行时分层；每个阶段都有明确产物和下一道闸门。</text>

    <g stroke="url(#architecture-line)" stroke-width="4" marker-end="url(#architecture-arrow)">
      <path d="M300 314h34"/>
      <path d="M565 314h34"/>
      <path d="M830 314h34"/>
      <path d="M1095 314h34"/>
    </g>

    <g filter="url(#architecture-shadow)">
      <g transform="translate(80 205)">
        <rect width="220" height="218" rx="24" fill="#0E1A24" stroke="#2DD4BF" stroke-opacity="0.42"/>
        <circle cx="38" cy="38" r="22" fill="#17342E"/>
        <text x="38" y="45" text-anchor="middle" fill="#2DD4BF" font-size="18" font-weight="750">01</text>
        <text x="24" y="98" fill="#F8FAFC" font-size="24" font-weight="680">Discover</text>
        <text x="24" y="132" fill="#A7B0C0" font-size="17">业务资产盘点</text>
        <text x="24" y="158" fill="#A7B0C0" font-size="17">机会矩阵</text>
        <text x="24" y="184" fill="#A7B0C0" font-size="17">分波路线图</text>
      </g>
      <g transform="translate(345 205)">
        <rect width="220" height="218" rx="24" fill="#0E1A24" stroke="#2DD4BF" stroke-opacity="0.42"/>
        <circle cx="38" cy="38" r="22" fill="#17342E"/>
        <text x="38" y="45" text-anchor="middle" fill="#2DD4BF" font-size="18" font-weight="750">02</text>
        <text x="24" y="98" fill="#F8FAFC" font-size="24" font-weight="680">Define</text>
        <text x="24" y="132" fill="#A7B0C0" font-size="17">Agent 蓝图</text>
        <text x="24" y="158" fill="#A7B0C0" font-size="17">工具契约</text>
        <text x="24" y="184" fill="#A7B0C0" font-size="17">实现准入闸门</text>
      </g>
      <g transform="translate(610 205)">
        <rect width="220" height="218" rx="24" fill="#0E1A24" stroke="#A3E635" stroke-opacity="0.54"/>
        <circle cx="38" cy="38" r="22" fill="#26381A"/>
        <text x="38" y="45" text-anchor="middle" fill="#A3E635" font-size="18" font-weight="750">03</text>
        <text x="24" y="98" fill="#F8FAFC" font-size="24" font-weight="680">Scaffold</text>
        <text x="24" y="132" fill="#A7B0C0" font-size="17">Node.js 网关</text>
        <text x="24" y="158" fill="#A7B0C0" font-size="17">Provider / Tools</text>
        <text x="24" y="184" fill="#A7B0C0" font-size="17">State / Scheduler</text>
      </g>
      <g transform="translate(875 205)">
        <rect width="220" height="218" rx="24" fill="#0E1A24" stroke="#2DD4BF" stroke-opacity="0.42"/>
        <circle cx="38" cy="38" r="22" fill="#17342E"/>
        <text x="38" y="45" text-anchor="middle" fill="#2DD4BF" font-size="18" font-weight="750">04</text>
        <text x="24" y="98" fill="#F8FAFC" font-size="24" font-weight="680">Harden</text>
        <text x="24" y="132" fill="#A7B0C0" font-size="17">RBAC / Tenant</text>
        <text x="24" y="158" fill="#A7B0C0" font-size="17">Human approval</text>
        <text x="24" y="184" fill="#A7B0C0" font-size="17">Fail-closed controls</text>
      </g>
      <g transform="translate(1140 205)">
        <rect width="220" height="218" rx="24" fill="#0E1A24" stroke="#2DD4BF" stroke-opacity="0.42"/>
        <circle cx="38" cy="38" r="22" fill="#17342E"/>
        <text x="38" y="45" text-anchor="middle" fill="#2DD4BF" font-size="18" font-weight="750">05</text>
        <text x="24" y="98" fill="#F8FAFC" font-size="24" font-weight="680">Operate</text>
        <text x="24" y="132" fill="#A7B0C0" font-size="17">Deterministic eval</text>
        <text x="24" y="158" fill="#A7B0C0" font-size="17">Audit / Dashboard</text>
        <text x="24" y="184" fill="#A7B0C0" font-size="17">Ops runbook</text>
      </g>
    </g>

    <path d="M720 453v64" stroke="#2DD4BF" stroke-width="3" stroke-dasharray="8 8"/>
    <circle cx="720" cy="520" r="5" fill="#A3E635"/>

    <g transform="translate(80 536)">
      <rect width="1280" height="104" rx="24" fill="#0C2020" stroke="#2DD4BF" stroke-opacity="0.36"/>
      <text x="32" y="43" fill="#2DD4BF" font-size="17" font-weight="720" letter-spacing="1.8">SINGLE SOURCE OF TRUTH</text>
      <text x="32" y="77" fill="#F8FAFC" font-size="25" font-weight="670">kit/core/</text>
      <text x="208" y="77" fill="#A7B0C0" font-size="20">10 个命令契约 · 模板 · 知识库 · 事故清单</text>
      <rect x="970" y="26" width="278" height="52" rx="16" fill="#17342E"/>
      <text x="1109" y="59" text-anchor="middle" fill="#A3E635" font-size="18" font-weight="680">方法论只在这里维护</text>
    </g>

    <g transform="translate(80 664)">
      <rect width="610" height="152" rx="24" fill="#0E1724" stroke="#2DD4BF" stroke-opacity="0.28"/>
      <text x="30" y="42" fill="#2DD4BF" font-size="17" font-weight="720" letter-spacing="1.5">TOOL DISCOVERY</text>
      <text x="30" y="78" fill="#F8FAFC" font-size="25" font-weight="670">kit/adapters/</text>
      <text x="30" y="111" fill="#A7B0C0" font-size="18">六工具薄入口；结构验证 ≠ 客户端人工认证</text>
      <text x="30" y="136" fill="#A7B0C0" font-size="18">Claude · Cursor · Copilot · Codex · CodeBuddy · Trae</text>
    </g>
    <g transform="translate(750 664)">
      <rect width="610" height="152" rx="24" fill="#0E1724" stroke="#A3E635" stroke-opacity="0.34"/>
      <text x="30" y="42" fill="#A3E635" font-size="17" font-weight="720" letter-spacing="1.5">RUNTIME + EVIDENCE</text>
      <text x="30" y="78" fill="#F8FAFC" font-size="25" font-weight="670">scaffold/ + examples/</text>
      <text x="30" y="111" fill="#A7B0C0" font-size="18">零依赖运行时骨架 + 合成样例 + 可重复检查</text>
      <text x="30" y="136" fill="#A7B0C0" font-size="18">Mock / contract / loopback 是仓库证据，不是生产认证</text>
    </g>
  </g>
</svg>
