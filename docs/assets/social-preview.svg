<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="social-title social-desc">
  <title id="social-title">Business Agent Kit social preview</title>
  <desc id="social-desc">Business Agent Kit is an open-source workflow, runtime scaffold, and evidence system for taking business AI agents from opportunity to operation.</desc>
  <defs>
    <linearGradient id="social-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#070B14"/>
      <stop offset="0.58" stop-color="#0A161C"/>
      <stop offset="1" stop-color="#0D211A"/>
    </linearGradient>
    <linearGradient id="social-accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2DD4BF"/>
      <stop offset="1" stop-color="#A3E635"/>
    </linearGradient>
    <radialGradient id="social-glow" cx="84%" cy="22%" r="58%">
      <stop offset="0" stop-color="#2DD4BF" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#2DD4BF" stop-opacity="0"/>
    </radialGradient>
    <pattern id="social-grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" fill="none" stroke="#A7B0C0" stroke-opacity="0.055"/>
    </pattern>
  </defs>
  <rect width="1280" height="640" fill="url(#social-bg)"/>
  <rect width="1280" height="640" fill="url(#social-glow)"/>
  <rect width="1280" height="640" fill="url(#social-grid)"/>
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <g transform="translate(72 68)">
      <rect width="58" height="58" rx="18" fill="#102822" stroke="#2DD4BF" stroke-opacity="0.68"/>
