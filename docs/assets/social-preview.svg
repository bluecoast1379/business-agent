      <circle cx="30" cy="31" r="4.5" fill="#2DD4BF"/>
      <path d="M35 31h10" stroke="#2DD4BF" stroke-width="4" stroke-linecap="round"/>
      <text x="78" y="24" fill="#A3E635" font-size="28" font-weight="720" letter-spacing="2.2">OPEN-SOURCE AI DELIVERY KIT</text>
      <text x="78" y="58" fill="#A7B0C0" font-size="28">bluecoast1379 / business-agent</text>
    </g>

    <text x="72" y="246" fill="#F8FAFC" font-size="72" font-weight="760" letter-spacing="-2.4">Business Agent Kit</text>
    <text x="72" y="304" fill="#D7DEE9" font-size="30" font-weight="560">从业务机会到可运行 Agent 网关</text>
    <text x="72" y="351" fill="#A7B0C0" font-size="28">Workflow · Runtime Scaffold · Guardrails · Evals</text>

