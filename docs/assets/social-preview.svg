      <text x="178" y="72" text-anchor="middle" fill="#2DD4BF" font-size="28" font-weight="680">Business workflow</text>
      <path d="M346 62h54" stroke="url(#social-accent)" stroke-width="3"/>
      <rect x="418" y="30" width="300" height="64" rx="20" fill="#133029"/>
