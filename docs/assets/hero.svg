<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="720" viewBox="0 0 1440 720" role="img" aria-labelledby="hero-title hero-desc">
  <title id="hero-title">Business Agent Kit hero</title>
  <desc id="hero-desc">Business Agent Kit turns business discovery into a runnable agent gateway through workflow, runtime, and evidence gates.</desc>
  <defs>
    <linearGradient id="hero-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#070B14"/>
      <stop offset="0.55" stop-color="#0B1720"/>
      <stop offset="1" stop-color="#0D1D18"/>
    </linearGradient>
    <linearGradient id="hero-accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2DD4BF"/>
      <stop offset="1" stop-color="#A3E635"/>
    </linearGradient>
    <radialGradient id="hero-glow" cx="82%" cy="18%" r="62%">
      <stop offset="0" stop-color="#2DD4BF" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#2DD4BF" stop-opacity="0"/>
    </radialGradient>
    <pattern id="hero-grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#A7B0C0" stroke-opacity="0.06"/>
    </pattern>
    <filter id="hero-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#000000" flood-opacity="0.32"/>
    </filter>
  </defs>
  <rect width="1440" height="720" rx="32" fill="url(#hero-bg)"/>
  <rect width="1440" height="720" rx="32" fill="url(#hero-glow)"/>
  <rect width="1440" height="720" rx="32" fill="url(#hero-grid)"/>

  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <g transform="translate(88 76)">
      <rect width="64" height="64" rx="20" fill="#102822" stroke="#2DD4BF" stroke-opacity="0.62"/>
      <path d="M19 22h16c7.2 0 13 5.8 13 13s-5.8 13-13 13H19V22Z" fill="none" stroke="#A3E635" stroke-width="4"/>
      <circle cx="34" cy="35" r="5" fill="#2DD4BF"/>
      <path d="M39 35h10" stroke="#2DD4BF" stroke-width="4" stroke-linecap="round"/>
      <text x="84" y="25" fill="#A3E635" font-size="18" font-weight="700" letter-spacing="2.8">OPEN-SOURCE AI DELIVERY KIT</text>
      <text x="84" y="55" fill="#A7B0C0" font-size="19">Workflow · Runtime · Evidence</text>
    </g>

    <text x="88" y="260" fill="#F8FAFC" font-size="78" font-weight="760" letter-spacing="-2.8">Business Agent Kit</text>
    <text x="88" y="320" fill="#D7DEE9" font-size="30" font-weight="520">从业务机会到可运行 Agent 网关</text>
    <text x="88" y="365" fill="#A7B0C0" font-size="24">先回答业务问题，再生成代码；每一步都留下可检查证据。</text>

    <g transform="translate(88 430)" filter="url(#hero-shadow)">
      <rect width="1264" height="184" rx="28" fill="#0C1420" stroke="#2DD4BF" stroke-opacity="0.26"/>
      <g transform="translate(34 34)">
        <circle cx="24" cy="24" r="24" fill="#17342E"/>
        <text x="24" y="31" text-anchor="middle" fill="#2DD4BF" font-size="20" font-weight="750">01</text>
        <text x="0" y="83" fill="#F8FAFC" font-size="25" font-weight="680">Discover</text>
        <text x="0" y="116" fill="#A7B0C0" font-size="18">业务资产与机会</text>
      </g>
      <path d="M276 92h86" stroke="url(#hero-accent)" stroke-width="3" stroke-linecap="round"/>
      <path d="m352 84 10 8-10 8" fill="none" stroke="#A3E635" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <g transform="translate(390 34)">
        <circle cx="24" cy="24" r="24" fill="#17342E"/>
        <text x="24" y="31" text-anchor="middle" fill="#2DD4BF" font-size="20" font-weight="750">02</text>
        <text x="0" y="83" fill="#F8FAFC" font-size="25" font-weight="680">Design</text>
        <text x="0" y="116" fill="#A7B0C0" font-size="18">蓝图与工具契约</text>
      </g>
      <path d="M642 92h86" stroke="url(#hero-accent)" stroke-width="3" stroke-linecap="round"/>
      <path d="m718 84 10 8-10 8" fill="none" stroke="#A3E635" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <g transform="translate(756 34)">
        <circle cx="24" cy="24" r="24" fill="#17342E"/>
        <text x="24" y="31" text-anchor="middle" fill="#2DD4BF" font-size="20" font-weight="750">03</text>
        <text x="0" y="83" fill="#F8FAFC" font-size="25" font-weight="680">Build</text>
        <text x="0" y="116" fill="#A7B0C0" font-size="18">零依赖网关骨架</text>
      </g>
      <path d="M1008 92h86" stroke="url(#hero-accent)" stroke-width="3" stroke-linecap="round"/>
      <path d="m1084 84 10 8-10 8" fill="none" stroke="#A3E635" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <g transform="translate(1122 34)">
        <circle cx="24" cy="24" r="24" fill="#17342E"/>
        <text x="24" y="31" text-anchor="middle" fill="#2DD4BF" font-size="20" font-weight="750">04</text>
        <text x="0" y="83" fill="#F8FAFC" font-size="25" font-weight="680">Operate</text>
        <text x="0" y="116" fill="#A7B0C0" font-size="18">安全、评测与运营</text>
      </g>
    </g>
  </g>
</svg>
