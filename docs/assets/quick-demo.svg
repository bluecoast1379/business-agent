<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="720" viewBox="0 0 1440 720" role="img" aria-labelledby="quick-title quick-desc">
  <title id="quick-title">Business Agent Kit 30-second quick demo</title>
  <desc id="quick-desc">Three terminal steps check Node.js, create a demo folder, and generate a shared workflow core plus ten Claude Code command entries.</desc>
  <defs>
    <linearGradient id="quick-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#070B14"/>
      <stop offset="1" stop-color="#0B1B18"/>
    </linearGradient>
    <linearGradient id="quick-accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2DD4BF"/>
      <stop offset="1" stop-color="#A3E635"/>
    </linearGradient>
    <filter id="quick-shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="28" flood-color="#000000" flood-opacity="0.34"/>
    </filter>
  </defs>
  <rect width="1440" height="720" rx="32" fill="url(#quick-bg)"/>
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <text x="78" y="86" fill="#F8FAFC" font-size="48" font-weight="740">30 秒 Quick Demo</text>
    <text x="78" y="128" fill="#A7B0C0" font-size="21">Node.js ≥22 · 已发布 v0.3.0 · 下载时间不计</text>

    <g transform="translate(78 174)" filter="url(#quick-shadow)">
      <rect width="1284" height="426" rx="28" fill="#0A101B" stroke="#2DD4BF" stroke-opacity="0.34"/>
      <rect width="1284" height="54" rx="28" fill="#111B28"/>
      <rect y="28" width="1284" height="26" fill="#111B28"/>
      <circle cx="30" cy="27" r="7" fill="#FB7185"/>
      <circle cx="54" cy="27" r="7" fill="#F59E0B"/>
      <circle cx="78" cy="27" r="7" fill="#A3E635"/>
      <text x="642" y="34" text-anchor="middle" fill="#A7B0C0" font-size="16">business-agent-demo — terminal</text>

      <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
        <circle cx="50" cy="105" r="20" fill="#17342E"/>
        <text x="50" y="112" text-anchor="middle" fill="#2DD4BF" font-size="18" font-weight="700">1</text>
        <text x="88" y="112" fill="#A3E635" font-size="21">$</text>
        <text x="116" y="112" fill="#F8FAFC" font-size="21">node --version</text>
        <text x="908" y="112" fill="#2DD4BF" font-size="19">→ v22.0.0 or later</text>

        <line x1="38" y1="150" x2="1246" y2="150" stroke="#A7B0C0" stroke-opacity="0.12"/>
        <circle cx="50" cy="198" r="20" fill="#17342E"/>
        <text x="50" y="205" text-anchor="middle" fill="#2DD4BF" font-size="18" font-weight="700">2</text>
        <text x="88" y="205" fill="#A3E635" font-size="21">$</text>
        <text x="116" y="205" fill="#F8FAFC" font-size="21">mkdir business-agent-demo &amp;&amp; cd business-agent-demo</text>

        <line x1="38" y1="244" x2="1246" y2="244" stroke="#A7B0C0" stroke-opacity="0.12"/>
        <circle cx="50" cy="292" r="20" fill="#17342E"/>
        <text x="50" y="299" text-anchor="middle" fill="#2DD4BF" font-size="18" font-weight="700">3</text>
        <text x="88" y="299" fill="#A3E635" font-size="21">$</text>
        <text x="116" y="299" fill="#F8FAFC" font-size="20">npx --yes --package=business-agent@0.3.0 \</text>
        <text x="116" y="333" fill="#F8FAFC" font-size="20">  business-agent-init --target . --tools claude --yes</text>
      </g>

      <rect x="38" y="360" width="1208" height="44" rx="12" fill="#102822"/>
      <circle cx="62" cy="382" r="8" fill="#A3E635"/>
      <text x="82" y="389" fill="#DDF7C3" font-size="18" font-weight="620">Expected: workflow core + scaffold + AGENTS.md + 10 Claude Code commands</text>
    </g>

    <text x="78" y="652" fill="#A7B0C0" font-size="19">初始化只写目标目录；不会 push、部署、写数据库或修改生产配置。</text>
    <rect x="1135" y="625" width="227" height="42" rx="21" fill="url(#quick-accent)"/>
    <text x="1248" y="652" text-anchor="middle" fill="#07110D" font-size="18" font-weight="760">Repeatable by default</text>
  </g>
</svg>
